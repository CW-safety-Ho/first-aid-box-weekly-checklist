<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>急救箱每週檢查表 | First Aid Box Weekly Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
</head>
<body class="bg-[#111827] text-gray-100 min-h-screen p-4 sm:p-6">

    <div id="checklist-container" class="max-w-2xl mx-auto bg-[#1f2937] rounded-2xl shadow-xl p-6 border border-gray-700">
        
        <div class="flex flex-col items-center text-center border-b border-gray-700 pb-6 mb-6">
            <img src="company_logo_38.png" alt="Company Logo" class="h-16 w-auto object-contain mb-3" onerror="this.style.display='none'">
            <h1 class="text-2xl font-bold text-white tracking-wide">急救箱每週檢查表</h1>
            <p class="text-sm text-gray-400 mt-1">First Aid Box Weekly Checklist</p>
        </div>

        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
                    Project Select / 選擇地盤項目
                </label>
                <select id="project-select" required
                        class="w-full bg-[#374151] border border-gray-600 rounded-lg px-3 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="" disabled selected>-- Please Select a Project / 請選擇項目 --</option>
                    <option value="(952) NE/2017/03">(952) NE/2017/03</option>
                    <option value="(969) Hiu Ming Street">(969) Hiu Ming Street</option>
                    <option value="(992) DC/2018/07">(992) DC/2018/07</option>
                    <option value="(997) ND/2019/02">(997) ND/2019/02</option>
                    <option value="(1007) 1/WSD/19">(1007) 1/WSD/19</option>
                    <option value="(1010) ND/2019/04">(1010) ND/2019/04</option>
                    <option value="(1027) DC/2020/02">(1027) DC/2020/02</option>
                    <option value="(1045) 3/WSD/21">(1045) 3/WSD/21</option>
                    <option value="(1046) 6/WSD/21">(1046) 6/WSD/21</option>
                    <option value="(1054) 3/WSD/24">(1054) 3/WSD/24</option>
                    <option value="(1057) 18/WSD/21">(1057) 18/WSD/21</option>
                    <option value="(1068) SS L515">(1068) SS L515</option>
                    <option value="(1069) DC/2022/01">(1069) DC/2022/01</option>
                    <option value="(1073) DC/2022/05">(1073) DC/2022/05</option>
                    <option value="(1076) 21/WSD/21">(1076) 21/WSD/21</option>
                    <option value="(1077) Penfold Park">(1077) Penfold Park</option>
                    <option value="(1078) TC LM012">(1078) TC LM012</option>
                    <option value="(1079) TC LM021">(1079) TC LM021</option>
                    <option value="(1081) SS L513">(1081) SS L513</option>
                    <option value="(1086) IS/2022/02">(1086) IS/2022/02</option>
                    <option value="(1089) KWH Phase 2">(1089) KWH Phase 2</option>
                    <option value="(1090) DC/2023/08">(1090) DC/2023/08</option>
                    <option value="(1105) CV/2023/03">(1105) CV/2023/03</option>
                    <option value="(1113) YL/2023/02">(1113) YL/2023/02</option>
                    <option value="(1119) HKGGA">(1119) HKGGA</option>
                    <option value="(1120) DC/2024/04">(1120) DC/2024/04</option>
                    <option value="(1126) T24M101">(1126) T24M101</option>
                    <option value="(1129) HA-TMC-O44">(1129) HA-TMC-O44</option>
                    <option value="(1130) DC/2023/11">(1130) DC/2023/11</option>
                    <option value="(1131) ND/2024/04">(1131) ND/2024/04</option>
                    <option value="(1138) TC N952">(1138) TC N952</option>
                    <option value="(1139) TC N921">(1139) TC N921</option>
                    <option value="(1146) SS P506">(1146) SS P506</option>
                    <option value="(1152) TC P928">(1152) TC P928</option>
                    <option value="(1157) UPS">(1157) UPS</option>
                    <option value="(1164) TC PM021">(1164) TC PM021</option>
                    <option value="(1165) TC PM031">(1165) TC PM031</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
                    Workforce Size / 地盤工人總數 (Cap. 59I)
                </label>
                <select id="workforce-select" onchange="updateQuantities()" class="w-full bg-[#374151] border border-gray-600 rounded-lg px-3 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="under50">Fewer than 50 workers / 少於 50 人</option>
                    <option value="over50" selected>50 or more workers / 50 人或以上</option>
                </select>
            </div>
        </div>

        <div id="stretcher-warning" class="bg-amber-950/40 border border-amber-500/50 rounded-xl p-4 mb-6 hidden">
            <div class="flex items-start space-x-3">
                <span class="text-amber-400 text-xl">⚠️</span>
                <div>
                    <h4 class="text-sm font-semibold text-amber-400">Cap. 59I MANDATORY ALERT (50+ Workers)</h4>
                    <p class="text-xs text-amber-300/90 mt-1 leading-relaxed">
                        The contractor must cause a <strong>Stretcher</strong> to be provided at the site and ensure it is kept alongside this first aid box.
                    </p>
                    <p class="text-xs text-amber-400/90 mt-0.5 font-medium">
                        法例警告：50人或以上地盤，承建商必須在急急箱或急救櫃旁邊額外設置一副「擔架床」。
                    </p>
                </div>
            </div>
        </div>

        <div class="border border-gray-700 rounded-xl overflow-hidden bg-[#1f2937]">
            <div class="bg-[#2d3748] px-4 py-3 border-b border-gray-700">
                <h3 class="text-sm font-semibold text-white tracking-wide">STATUTORY ITEMS / 法定必備項目</h3>
            </div>
            
            <div class="divide-y divide-gray-700" id="items-list">
                </div>
        </div>

        <div class="mt-8 flex flex-col sm:flex-row gap-3">
            <button onclick="exportToPDF()" class="w-full sm:w-1/2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 shadow-lg flex items-center justify-center space-x-2">
                <span>📁</span>
                <span>Export PDF / 匯出報告</span>
            </button>
            <button onclick="resetForm()" class="w-full sm:w-1/2 bg-gray-700 hover:bg-gray-600 text-gray-200 font-semibold py-3 px-4 rounded-xl transition duration-200 flex items-center justify-center space-x-2">
                <span>🔄</span>
                <span>Reset / 重設表單</span>
            </button>
        </div>
    </div>

    <script>
        // 法定項目定義（根據第 59I 章 附表 4）
        const checklistItems = [
            { id: 'booklet', en: '"Hints on First Aid" Booklet', zh: '「急救指南」小冊子 (正本/副本)', qtyUnder50: 1, qtyOver50: 1 },
            { id: 'dress_s', en: 'Sterile Unmedicated Dressings (Small)', zh: '消毒不含藥敷料：細碼 (手指用)', qtyUnder50: 12, qtyOver50: 12 },
            { id: 'dress_m', en: 'Sterile Unmedicated Dressings (Medium)', zh: '消毒不含藥敷料：中碼 (手腳用)', qtyUnder50: 6, qtyOver50: 6 },
            { id: 'dress_l', en: 'Sterile Unmedicated Dressings (Large)', zh: '消毒不含藥敷料：大碼 (身體用)', qtyUnder50: 6, qtyOver50: 6 },
            { id: 'waterproof_ad', en: 'Waterproof Adhesive Wound Dressings', zh: '各大小尺碼不同的防水黏性傷口敷料', qtyUnder50: 24, qtyOver50: 24 },
            { id: 'triangular', en: 'Triangular Bandages (Unbleached Calico)', zh: '原色棉布三角繃帶 (最長邊≥1.3米)', qtyUnder50: 4, qtyOver50: 4 },
            { id: 'plaster', en: 'Rolls of Adhesive Plaster (Zinc Oxide)', zh: '黏貼膠布 (氧化鋅) (至少4.5米x25毫米)', qtyUnder50: 1, qtyOver50: 1 },
            { id: 'cotton', en: 'Packets of Absorbent Cotton Wool (30g)', zh: '30克包裝的吸水脫脂棉', qtyUnder50: 6, qtyOver50: 6 },
            { id: 'pressure_b', en: 'Pressure Bandage', zh: '壓力繃帶', qtyUnder50: 1, qtyOver50: 1 },
            { id: 'pins', en: 'Safety Pins', zh: '安全扣針', qtyUnder50: 6, qtyOver50: 6 },
            { id: 'eyebath', en: 'Eye Bath', zh: '洗眼杯', qtyUnder50: 'Sufficient / 足量', qtyOver50: 'Sufficient / 足量' },
            { id: 'label_marking', en: 'Container Labeling ("FIRST AID" & "急救")', zh: '急救箱外殼清晰標明「急救」及 "FIRST AID"', qtyUnder50: 'Required', qtyOver50: 'Required' },
            { id: 'aider_notice', en: 'Notice of Certified First-Aiders in Charge', zh: '貼有負責該設施之指定合資格急救員姓名告示', qtyUnder50: 'Required', qtyOver50: 'Required' }
        ];

        function renderChecklist(tier) {
            const container = document.getElementById('items-list');
            container.innerHTML = '';

            checklistItems.forEach(item => {
                const targetQty = tier === 'under50' ? item.qtyUnder50 : item.qtyOver50;
                
                const itemRow = document.createElement('div');
                itemRow.className = 'p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3 hover:bg-[#283548] transition';
                
                itemRow.innerHTML = `
                    <div class="space-y-0.5">
                        <p class="text-sm font-semibold text-white">${item.en}</p>
                        <p class="text-xs text-gray-400">${item.zh}</p>
                    </div>
                    <div class="flex items-center space-x-4 self-end sm:self-center">
                        <span class="bg-blue-900/50 border border-blue-700/60 text-blue-300 text-xs font-medium px-2.5 py-1 rounded-md">
                            Req / 要求: ${targetQty}
                        </span>
                        <input type="checkbox" checked class="w-5 h-5 rounded text-blue-600 bg-gray-700 border-gray-600 focus:ring-blue-500 focus:ring-offset-gray-800">
                    </div>
                `;
                container.appendChild(itemRow);
            });

            // 根據工人人數動態顯示/隱藏擔架床警告
            const warningBox = document.getElementById('stretcher-warning');
            if (tier === 'over50') {
                warningBox.classList.remove('hidden');
            } else {
                warningBox.classList.add('hidden');
            }
        }

        function updateQuantities() {
            const tier = document.getElementById('workforce-select').value;
            renderChecklist(tier);
        }

        function resetForm() {
            document.getElementById('project-select').selectedIndex = 0;
            document.getElementById('workforce-select').value = 'over50';
            renderChecklist('over50');
        }

        function exportToPDF() {
            const element = document.getElementById('checklist-container');
            const project = document.getElementById('project-select').value || "Unknown_Project";
            const cleanProjectName = project.replace(/[^a-zA-Z0-9]/g, "_");
            const timestamp = new Date().toISOString().slice(0, 10);
            
            const opt = {
                margin: [10, 10, 10, 10],
                filename: `急救箱每週檢查表_${cleanProjectName}_${timestamp}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true, 
                    logging: false,
                    backgroundColor: '#ffffff' // 強制底層用白底進行畫布渲染，避免黑畫面
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // 利用 onclone 在背景將 DOM 樣式臨時改為白底黑字（高清晰列印風格），100% 解決 PDF 裁剪與深色黑掉問題
            html2pdf().set(opt).from(element).toContainer().toCanvas().set({
                jsPDF: opt.jsPDF,
                html2canvas: {
                    ...opt.html2canvas,
                    onclone: (clonedDoc) => {
                        const clonedContainer = clonedDoc.getElementById('checklist-container');
                        clonedContainer.style.background = '#ffffff';
                        clonedContainer.style.color = '#111827';
                        clonedContainer.style.boxShadow = 'none';
                        clonedContainer.style.border = 'none';

                        const h1 = clonedContainer.querySelector('h1');
                        if(h1) h1.style.color = '#111827';
                        
                        const warning = clonedContainer.getElementById('stretcher-warning');
                        if (warning && !warning.classList.contains('hidden')) {
                            warning.style.background = '#fffbeb';
                            warning.style.borderColor = '#f59e0b';
                            warning.style.color = '#78350f';
                            const warningTexts = warning.querySelectorAll('h4, p');
                            warningTexts.forEach(t => t.style.color = '#78350f');
                        }

                        const rows = clonedContainer.querySelectorAll('#items-list > div');
                        rows.forEach(row => {
                            row.style.borderBottom = '1px solid #e5e7eb';
                            const texts = row.querySelectorAll('p');
                            if(texts[0]) texts[0].style.color = '#111827';
                            if(texts[1]) texts[1].style.color = '#4b5563';
                            
                            const badge = row.querySelector('span');
                            if(badge) {
                                badge.style.background = '#f3f4f6';
                                badge.style.borderColor = '#d1d5db';
                                badge.style.color = '#1f2937';
                            }
                        });

                        // 隱藏 PDF 裡的按鈕
                        const buttons = clonedContainer.querySelector('.mt-8');
                        if (buttons) buttons.style.display = 'none';
                    }
                }
            }).save();
        }

        // 頁面加載自動初始化
        window.onload = () => { renderChecklist('over50'); };
    </script>
</body>
</html>
